<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ========================== META DATA ========================== -->

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>React</title>

</head>



<!-- ========================== BODY ========================== -->

<body>

    
    <!-- Button -->
    <button>

        Button Clicked

    </button>

</body>





<!-- ========================== JAVASCRIPT ========================== -->

<script>

    // ========================== CLASS ==========================

    /**
     * Creating class named React
     */

    class React {


        // ========================== CONSTRUCTOR ==========================

        /**
         * constructor()
         *
         * Automatically runs when:
         * object is created
         */

        constructor(){


            // ========================== PROPERTIES ==========================

            this.library = "React";

            this.server = "https://localhost:300";



            // ========================== REQUIREMENT ==========================

            /**
             * Add click event on button
             */

            document

                .querySelector('button')

                .addEventListener(

                    'click',

                    
                    /**
                     * bind(this)
                     *
                     * Binds current object context
                     */

                    this.handleClick.bind(this)
                );
        }



        // ========================== METHOD ==========================

        handleClick(){


            console.log("button clicked");



            /**
             * this.server
             *
             * Access current object property
             */

            console.log(this.server);
        }
    }



    // ========================== CREATE OBJECT ==========================

    /**
     * new keyword:
     * Creates instance/object
     */

    const app = new React();

</script>

</html>

↓
constructor executes
↓
Event listener added

bind(this) ensures:

// ========================== bind() ==========================

/**
 * bind() -> Returns new function with fixed this value
 */

// ========================== SIMPLE EXAMPLE ==========================

const user = {
    name: "Tripti",
    greet: function(){
        console.log(this.name);
    }
};

// Without bind
const fn = user.greet;
fn();

/**
 * Output:
 *
 * undefined
 */

// With bind
const boundFn = user.greet.bind(user);
boundFn();

/**
 * Output:
 *
 * Tripti
 */
