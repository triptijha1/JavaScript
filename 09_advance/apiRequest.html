<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ========================== META DATA ========================== -->

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>GitHub Profile Card</title>

</head>



<!-- ========================== CSS ========================== -->

<style>

    /* ========================== GLOBAL RESET ========================== */

    *{

        margin: 0;

        padding: 0;

        box-sizing: border-box;

        font-family: Arial, Helvetica, sans-serif;
    }



    /* ========================== BODY STYLING ========================== */

    body{

        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        background: linear-gradient(135deg, #141e30, #243b55);

        color: white;
    }



    /* ========================== CONTAINER ========================== */

    .container{

        text-align: center;
    }



    /* ========================== BUTTON ========================== */

    button{

        padding: 14px 28px;

        border: none;

        border-radius: 12px;

        background: #6c63ff;

        color: white;

        font-size: 18px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
    }



    /* Hover effect */

    button:hover{

        background: #574bdb;

        transform: translateY(-3px);
    }



    /* ========================== PROFILE CARD ========================== */

    .card{

        width: 350px;

        margin-top: 30px;

        background: rgba(255,255,255,0.08);

        backdrop-filter: blur(12px);

        border-radius: 20px;

        padding: 30px;

        box-shadow: 0 10px 30px rgba(0,0,0,0.4);

        
        /* Hidden initially */
        display: none;
    }



    /* ========================== PROFILE IMAGE ========================== */

    .card img{

        width: 140px;

        height: 140px;

        border-radius: 50%;

        border: 4px solid #6c63ff;

        margin-bottom: 20px;
    }



    /* ========================== NAME ========================== */

    .card h2{

        margin-bottom: 10px;

        font-size: 28px;
    }



    /* ========================== BIO ========================== */

    .card p{

        margin-bottom: 12px;

        color: #dcdcdc;

        line-height: 1.5;
    }



    /* ========================== INFO BOX CONTAINER ========================== */

    .info{

        margin-top: 20px;

        display: flex;

        justify-content: space-between;

        gap: 10px;
    }



    /* ========================== SMALL INFO BOX ========================== */

    .box{

        flex: 1;

        background: rgba(255,255,255,0.05);

        padding: 15px;

        border-radius: 12px;
    }



    .box h3{

        margin-bottom: 8px;

        color: #6c63ff;
    }

</style>





<!-- ========================== BODY ========================== -->

<body>

    
    <!-- Main Container -->
    <div class="container">


        <!-- ========================== BUTTON ========================== -->

        <button id="loadBtn">

            Load GitHub Profile

        </button>



        <!-- ========================== PROFILE CARD ========================== -->

        <div class="card" id="profileCard">


            <!-- Profile Image -->
            <img id="avatar" src="" alt="profile">


            <!-- Name -->
            <h2 id="name"></h2>


            <!-- Bio -->
            <p id="bio"></p>



            <!-- ========================== PROFILE INFO ========================== -->

            <div class="info">


                <!-- Followers -->
                <div class="box">

                    <h3>Followers</h3>

                    <p id="followers"></p>

                </div>



                <!-- Public Repositories -->
                <div class="box">

                    <h3>Repos</h3>

                    <p id="repos"></p>

                </div>

            </div>

        </div>

    </div>

</body>





<!-- ========================== JAVASCRIPT ========================== -->

<script>

    // ========================== SELECT BUTTON ==========================

    const button = document.getElementById('loadBtn');



    // ========================== BUTTON CLICK EVENT ==========================

    button.addEventListener('click', function(){


        /**
         * GitHub API URL
         */

        const requestURL =
            'https://api.github.com/users/triptijha1';



        // ========================== CREATE AJAX REQUEST ==========================

        /**
         * XMLHttpRequest()
         *
         * Used to send HTTP requests
         */

        const xhr = new XMLHttpRequest();



        // ========================== OPEN REQUEST ==========================

        /**
         * open(method, url)
         *
         * GET -> Fetch data
         */

        xhr.open('GET', requestURL);




        // ========================== TRACK REQUEST STATE ==========================

        xhr.onreadystatechange = function(){


            /**
             * readyState === 4
             * -> Request completed
             *
             * status === 200
             * -> Successful request
             */

            if(xhr.readyState === 4 && xhr.status === 200){


                /**
                 * Convert JSON string into JavaScript object
                 */

                const data = JSON.parse(this.responseText);


                // Display response in console
                console.log(data);




                // ========================== UPDATE PROFILE DATA ==========================

                /**
                 * Set profile image
                 */

                document.getElementById('avatar').src =
                    data.avatar_url;



                /**
                 * Set name
                 */

                document.getElementById('name').innerHTML =
                    data.name;



                /**
                 * Set bio
                 */

                document.getElementById('bio').innerHTML =
                    data.bio;



                /**
                 * Set followers count
                 */

                document.getElementById('followers').innerHTML =
                    data.followers;



                /**
                 * Set repository count
                 */

                document.getElementById('repos').innerHTML =
                    data.public_repos;



                /**
                 * Show profile card
                 */

                document.getElementById('profileCard')
                    .style.display = 'block';
            }


            /**
             * ❌ ERROR IN ORIGINAL CODE
             *
             * console.log(data)
             *
             * This causes error because
             * data only exists inside if block
             */


            // console.log(data) ❌
        };



        // ========================== SEND REQUEST ==========================

        xhr.send();
    });





    // ========================== XHR READY STATES ==========================

    /**
     * 0 -> UNSENT
     * Client created
     * open() not called
     *
     *
     * 1 -> OPENED
     * open() called
     *
     *
     * 2 -> HEADERS_RECEIVED
     * send() called
     * headers available
     *
     *
     * 3 -> LOADING
     * Downloading response
     *
     *
     * 4 -> DONE
     * Request completed
     */





    // ========================== HOW THIS PROJECT WORKS ==========================

    /**
     * Step 1:
     * User clicks button
     *
     *
     * Step 2:
     * XMLHttpRequest created
     *
     *
     * Step 3:
     * Request sent to GitHub API
     *
     *
     * Step 4:
     * API returns profile data
     *
     *
     * Step 5:
     * JSON converted into object
     *
     *
     * Step 6:
     * DOM updated dynamically
     *
     *
     * Step 7:
     * Profile card displayed
     */





    // ========================== IMPORTANT DOM METHODS ==========================

    /**
     * getElementById()
     * -> Select element using ID
     *
     *
     * addEventListener()
     * -> Attach event listener
     *
     *
     * innerHTML
     * -> Update HTML content
     *
     *
     * style.display
     * -> Change visibility
     */





    // ========================== IMPORTANT JAVASCRIPT CONCEPTS ==========================

    /**
     * XMLHttpRequest
     * -> AJAX request handling
     *
     *
     * JSON.parse()
     * -> Convert JSON string into object
     *
     *
     * API
     * -> Fetch data from server
     *
     *
     * Event Handling
     * -> Button click interaction
     *
     *
     * DOM Manipulation
     * -> Dynamically updating webpage
     */

</script>

</html>
