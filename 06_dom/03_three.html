<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ========================== META DATA ========================== -->

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>DOM with Tripti</title>

</head>


<body style="background-color: black; color: aliceblue;">

    <!-- ========================== HEADING ========================== -->

    <h1>Welcome to DOM learning</h1>

</body>



<script>

    // ========================== CREATE ELEMENT ==========================

    /**
     * document.createElement()
     *
     * -> Creates new HTML element dynamically
     * -> Element is created in memory
     * -> Not visible on webpage until appended
     */

    const div = document.createElement('div');


    // Display created element in console
    console.log(div);



    // ========================== ADDING CLASS ==========================

    /**
     * className
     *
     * -> Adds CSS class to element
     */

    div.className = "main";



    // ========================== ADDING ID ==========================

    /**
     * Random ID generation
     *
     * Math.random()
     * -> Generates random decimal number
     *
     * Math.round()
     * -> Rounds number to nearest integer
     */

    div.id = Math.round(Math.random() * 10 + 1);



    // ========================== SET ATTRIBUTE ==========================

    /**
     * setAttribute(attribute, value)
     *
     * -> Adds attribute to element
     */

    div.setAttribute("title", "generated title");



    // ========================== STYLING ELEMENT ==========================

    /**
     * style.property
     *
     * -> Used to apply inline CSS
     */

    div.style.backgroundColor = "blue";

    div.style.padding = "12px";



    // ========================== CREATE TEXT NODE ==========================

    /**
     * document.createTextNode()
     *
     * -> Creates text node
     */

    const addText = document.createTextNode("DOM manipulation");



    // ========================== APPEND TEXT TO DIV ==========================

    /**
     * appendChild()
     *
     * -> Adds child element/node inside parent
     */

    div.appendChild(addText);



    // ========================== ADD DIV TO WEBPAGE ==========================

    /**
     * document.body.appendChild()
     *
     * -> Adds created div inside body
     * -> Now element becomes visible on webpage
     */

    document.body.appendChild(div);



    // ========================== FINAL OUTPUT ==========================

    /**
     * Final Generated HTML:
     *
     * <div class="main"
     *      id="random-number"
     *      title="generated title"
     *      style="background-color: blue; padding: 12px;">
     *
     *      DOM manipulation
     *
     * </div>
     */

</script>

</html>
